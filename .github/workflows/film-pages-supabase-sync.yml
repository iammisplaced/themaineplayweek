name: Film Pages Sync (Supabase Source)

on:
  schedule:
    - cron: "40 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync-film-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate static film pages from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: npm run film-pages:live:site

      - name: Commit and push changes
        run: |
          if git diff --quiet -- films data/film-pages-source.live.json; then
            echo "No film page changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add films data/film-pages-source.live.json
          git commit -m "Update generated film pages from Supabase"
          git push
